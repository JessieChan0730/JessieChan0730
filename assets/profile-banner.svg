<svg width="1280" height="480" viewBox="0 0 1280 480" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Jessie Chan profile banner</title>
  <desc id="desc">A warm-toned developer banner with abstract shapes and a code card.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="32" x2="1160" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#102A43"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(170 125) rotate(25) scale(270 210)">
      <stop stop-color="#FB923C" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FB923C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1050 360) rotate(-12) scale(300 210)">
      <stop stop-color="#22C55E" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="white" stroke-opacity="0.07"/>
    </pattern>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="1280" height="480" rx="36" fill="url(#bg)"/>
  <rect width="1280" height="480" rx="36" fill="url(#grid)"/>

  <circle cx="180" cy="128" r="170" fill="url(#glowLeft)" filter="url(#blur)"/>
  <circle cx="1050" cy="348" r="180" fill="url(#glowRight)" filter="url(#blur)"/>
  <path d="M1032 56C1128 82 1208 154 1226 232C1244 310 1200 396 1114 430C1028 464 900 446 838 374C776 302 782 176 850 110C918 44 1032 56 1032 56Z" fill="white" fill-opacity="0.04"/>

  <rect x="78" y="86" width="552" height="308" rx="28" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.16"/>
  <circle cx="118" cy="122" r="6" fill="#F87171"/>
  <circle cx="142" cy="122" r="6" fill="#FBBF24"/>
  <circle cx="166" cy="122" r="6" fill="#34D399"/>

  <text x="118" y="178" fill="white" font-family="'Segoe UI', 'Trebuchet MS', Arial, sans-serif" font-size="50" font-weight="700">
    Jessie Chan
  </text>
  <text x="118" y="220" fill="#E2E8F0" font-family="'Segoe UI', 'Trebuchet MS', Arial, sans-serif" font-size="24" font-weight="500">
    Learning Java, Python and JavaScript
  </text>
  <text x="118" y="272" fill="#FDBA74" font-family="'Segoe UI', 'Trebuchet MS', Arial, sans-serif" font-size="22" font-weight="600">
    Build small things. Keep improving.
  </text>

  <rect x="118" y="305" width="108" height="40" rx="20" fill="#F97316"/>
  <rect x="238" y="305" width="120" height="40" rx="20" fill="#2563EB"/>
  <rect x="370" y="305" width="156" height="40" rx="20" fill="#FACC15"/>

  <text x="151" y="331" fill="white" font-family="'Segoe UI', 'Trebuchet MS', Arial, sans-serif" font-size="18" font-weight="700">
    Java
  </text>
  <text x="272" y="331" fill="white" font-family="'Segoe UI', 'Trebuchet MS', Arial, sans-serif" font-size="18" font-weight="700">
    Python
  </text>
  <text x="401" y="331" fill="#111827" font-family="'Segoe UI', 'Trebuchet MS', Arial, sans-serif" font-size="18" font-weight="700">
    JavaScript
  </text>

  <g>
    <rect x="760" y="88" width="430" height="304" rx="28" fill="#FFF7ED" fill-opacity="0.95"/>
    <rect x="760" y="88" width="430" height="304" rx="28" stroke="#FED7AA" stroke-width="2"/>
    <rect x="792" y="124" width="112" height="10" rx="5" fill="#CBD5E1"/>
    <rect x="792" y="160" width="142" height="12" rx="6" fill="#0F172A"/>
    <rect x="792" y="190" width="250" height="12" rx="6" fill="#94A3B8"/>
    <rect x="792" y="234" width="320" height="18" rx="9" fill="#FFEDD5"/>
    <rect x="810" y="238" width="90" height="10" rx="5" fill="#F97316"/>
    <rect x="792" y="274" width="286" height="18" rx="9" fill="#E0F2FE"/>
    <rect x="810" y="278" width="140" height="10" rx="5" fill="#2563EB"/>
    <rect x="792" y="314" width="340" height="18" rx="9" fill="#ECFCCB"/>
    <rect x="810" y="318" width="186" height="10" rx="5" fill="#16A34A"/>

    <text x="792" y="362" fill="#475569" font-family="'Consolas', 'Courier New', monospace" font-size="18" font-weight="700">
      // one step at a time
    </text>
  </g>
</svg>
